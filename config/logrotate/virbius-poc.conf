# Virbius PoC log rotation (Redis + OpenResty). Java/Rust services use built-in rolling.
# Render and install:
#   bash scripts/install-logrotate.sh
#
# Env (optional): VIRBIUS_LOG_DIR, VIRBIUS_LOG_MAX_FILE_SIZE, VIRBIUS_LOG_MAX_HISTORY_DAYS, OPENRESTY_PREFIX

@VIRBIUS_LOG_DIR@/redis.log {
    daily
    size @VIRBIUS_LOG_MAX_FILE_SIZE@
    rotate @VIRBIUS_LOG_MAX_HISTORY_DAYS@
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
}

@OPENRESTY_PREFIX@/logs/access.log @OPENRESTY_PREFIX@/logs/error.log {
    daily
    size @VIRBIUS_LOG_MAX_FILE_SIZE@
    rotate @VIRBIUS_LOG_MAX_HISTORY_DAYS@
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
}
