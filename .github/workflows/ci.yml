name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package -DskipTests=false

  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build virbius-core
        working-directory: virbius-core
        run: cargo build --release
      - name: Test virbius-core
        working-directory: virbius-core
        run: cargo test --release

  rust-gateway-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build virbius-gateway-agent
        working-directory: virbius-gateway-agent
        run: cargo build --release
      - name: Test virbius-gateway-agent
        working-directory: virbius-gateway-agent
        run: cargo test --release

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust format check
        working-directory: virbius-core
        run: cargo fmt --check
      - name: Rust clippy
        working-directory: virbius-core
        run: cargo clippy -- -D warnings
      - name: Rust format check (gateway-agent)
        working-directory: virbius-gateway-agent
        run: cargo fmt --check
      - name: Rust clippy (gateway-agent)
        working-directory: virbius-gateway-agent
        run: cargo clippy -- -D warnings
