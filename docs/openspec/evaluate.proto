syntax = "proto3";

package virbius.engine.v1;

option java_package = "io.virbius.engine.v1";
option java_multiple_files = true;

// virbius-engine MVP: 管层 gateway-agent → engine
// 对齐 DESIGN v2.11 / openspec MVP-1.4
// ControlContext（F-11）：trace_id、user_id、device_id 与端 virbius_scan_ctx / HTTP Header 一致

service EvaluateService {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

message EvaluateRequest {
  string tenant_id = 1;
  string scene = 2;
  string role = 3;              // user | assistant | tool | retrieved
  string session_id = 4;
  string content = 5;           // 待检测正文
  bool is_stream_chunk = 6;       // MVP 输入侧一般为 false
  repeated Signal prior_signals = 7;
  string trace_id = 8;          // 管层解析后的最终 trace（F-10）
  string user_id = 9;           // 可选；与 X-Virbius-User-Id / virbius_scan_ctx 一致（F-11）
  string device_id = 10;        // 可选；与 X-Virbius-Device-Id / virbius_scan_ctx 一致（F-11）
}

message Signal {
  string rule_id = 1;
  int32 rule_revision = 2;
  string source = 3;            // edge | gateway | cloud | scan
  double score = 4;
  string suggest = 5;           // block | allow | review | ...
  string reason_code = 6;
  string layer = 7;             // edge | gateway | cloud
}

message EvaluateResponse {
  repeated Signal signals = 1;  // Prompt 等新增 signal
  EngineDecision decision = 2;
  string rule_id = 3;           // 终判主因规则
  int32 rule_revision = 4;
  string reason_code = 5;
  string trace_id = 6;
  bool degraded = 7;            // fail-open / 超时降级时为 true
}

message EngineDecision {
  string effective_action = 1;  // allow | block | review | rewrite | safe_reply
  bool would_block = 2;
  string safe_reply_id = 3;
  string enforce_mode = 4;      // dry_run | canary | full | disabled（本次决策上下文）
}
