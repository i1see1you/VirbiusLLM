syntax = "proto3";

package virbius.engine.v1;

option java_package = "io.virbius.engine.v1";
option java_multiple_files = true;

service EvaluateService {
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

message EvaluateRequest {
  string tenant_id = 1;
  string scene = 2;
  string role = 3;
  string session_id = 4;
  string content = 5;
  bool is_stream_chunk = 6;
  repeated Signal prior_signals = 7;
  string trace_id = 8;
  string user_id = 9;
  string device_id = 10;
  // 逻辑变量（RequestContext）；HTTP PoC 已用；gRPC 待生成代码对齐
  map<string, string> vars = 11;
}

message Signal {
  string rule_id = 1;
  int32 rule_revision = 2;
  string source = 3;
  double score = 4;
  string suggest = 5;
  string reason_code = 6;
  string layer = 7;
}

message EvaluateResponse {
  repeated Signal signals = 1;
  EngineDecision decision = 2;
  string rule_id = 3;
  int32 rule_revision = 4;
  string reason_code = 5;
  string trace_id = 6;
  bool degraded = 7;
}

message EngineDecision {
  string effective_action = 1;
  bool would_block = 2;
  string safe_reply_id = 3;
  string enforce_mode = 4;
}
